version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fintacharts_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintacharts_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintacharts_api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=fintacharts_db;Username=postgres;Password=postgres
    depends_on:
      - db

volumes:
  postgres_data: